name: Docker Image CI

on:
  push:
    branches: [ "feature_hcy" ]
    tags: [ 'v*.*.*' ]  # 添加标签触发，用于版本发布
  pull_request:
    branches: [ "feature_hcy" ]
  workflow_dispatch:
    inputs:
      branch:
        description: '选择要构建的分支'
        required: true
        default: 'feature_hcy'
        type: choice
        options:
          - feature_hcy
          # 可以在这里添加其他分支选项
      environment:
        description: '构建环境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: docker.io  # 如果是使用 Docker Hub
  # REGISTRY: ghcr.io  # 如果使用 GitHub Container Registry
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/bci  # 使用仓库名作为镜像名

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 如果需要推送到 GitHub Packages

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || 'feature_hcy' }}  # 手动触发时使用选定的分支

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        # 如果使用 GitHub Container Registry，则用以下配置
        # registry: ghcr.io
        # username: ${{ github.actor }}
        # password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,format=short
          type=raw,value=feature-hcy-{{sha}},enable=${{ github.ref == 'refs/heads/feature_hcy' }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BRANCH=${{ github.event.inputs.branch || 'feature_hcy' }}
          ENVIRONMENT=${{ github.event.inputs.environment || 'staging' }}
